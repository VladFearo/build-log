<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Inventory Restock Dashboard</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main class="dashboard">
      <h1>Inventory Restock Dashboard</h1>

      <section class="summary">
        <article class="summary-card">
          <h2>Total products</h2>
          <p id="total-products">0</p>
        </article>

        <article class="summary-card">
          <h2>Low stock</h2>
          <p id="low-stock-count">0</p>
        </article>

        <article class="summary-card">
          <h2>Out of stock</h2>
          <p id="out-of-stock-count">0</p>
        </article>

        <article class="summary-card">
          <h2>Total inventory value</h2>
          <p id="inventory-value">0</p>
        </article>

        <article class="summary-card">
          <h2>Greatest shortage</h2>
          <p id="greatest-shortage">None</p>
        </article>
      </section>

      <section class="controls">
        <input
          id="search-input"
          type="text"
          placeholder="Search by product name"
        />

        <select id="category-filter">
          <option value="all">All categories</option>
        </select>

        <select id="status-filter">
          <option value="all">All statuses</option>
          <option value="in-stock">In stock</option>
          <option value="low-stock">Low stock</option>
          <option value="out-of-stock">Out of stock</option>
        </select>

        <label>
          <input id="sort-stock-checkbox" type="checkbox" />
          Lowest stock first
        </label>
      </section>

      <section>
        <p id="visible-product-count">0 products shown</p>

        <div id="product-list" class="product-list"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
